

name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Check out the code ──────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Log in to Docker Hub ────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Step 3: Build and push the image ────────────────────────────
      # Tags the image with both :latest and the git commit SHA.
      # :latest  → always points to the newest build
      # :sha     → lets you roll back to any specific commit if needed
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/wego-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/wego-backend:${{ github.sha }}

      # ── Step 4: SSH into VPS and deploy ─────────────────────────────
      # Pulls the new image and restarts the container with zero downtime.
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/wego-backend:latest

            # Go to the backend folder where docker-compose.yml lives
            cd ~/wegobackend

            # Restart only the api service with the new image
            docker compose up -d --no-build api

            # Clean up old dangling images to save disk space
            docker image prune -f