version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: wego_backend
    restart: unless-stopped
    ports:
      - "10002:10000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 10000
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379
      RUN_JOBS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      # Firebase service account — mounted read-only, never baked into the image:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    networks:
      - wego_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: wego_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - wego_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  wego_net:
    driver: bridge